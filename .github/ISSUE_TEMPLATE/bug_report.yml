name: Bug Report
description: Report a bug or issue with the library
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Call Wallpaper.setWallpaper(...)
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code Sample
      description: Minimal code to reproduce the issue
      render: typescript
      placeholder: |
        import Wallpaper from '@rnstk/wallpaper';
        
        await Wallpaper.setWallpaper('...', 'HOME');

  - type: input
    id: version
    attributes:
      label: Library Version
      description: Which version of @rnstk/wallpaper are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: rn-version
    attributes:
      label: React Native Version
      placeholder: "0.83.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android Version
      placeholder: "14"

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any error logs or stack traces
      render: shell
      placeholder: Paste logcat output here

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
